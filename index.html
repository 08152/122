<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FPS Minecraft Shooter</title>

<style>
body { margin:0; overflow:hidden; background:black; }
#info{
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  color:white;
  font-family:Arial;
}
#crosshair{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:20px;
  pointer-events:none;
}
</style>
</head>
<body>

<div id="info">CLICK TO START</div>
<div id="crosshair">+</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 2, 5);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 1));

// =====================
// GRÜNER BODEN (MINECRAFT STYLE)
// =====================
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x2ecc71})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// =====================
// PISTOLE (SIMPLE FPS MODEL)
// =====================
const gun = new THREE.Group();

const body = new THREE.Mesh(
  new THREE.BoxGeometry(0.2,0.2,0.6),
  new THREE.MeshStandardMaterial({color:0x333333})
);

const grip = new THREE.Mesh(
  new THREE.BoxGeometry(0.15,0.3,0.15),
  new THREE.MeshStandardMaterial({color:0x222222})
);
grip.position.y = -0.25;

gun.add(body);
gun.add(grip);

// Kamera -> Waffe in Hand
camera.add(gun);
scene.add(camera);

// FPS Position (wichtig!)
gun.position.set(0.4,-0.3,-0.7);

// =====================
// MOVEMENT (MINECRAFT STYLE)
// =====================
let velocityY = 0;
let isGrounded = true;

const keys = {};

document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

// =====================
// MOUSE LOOK
// =====================
let yaw = 0;
let pitch = 0;

document.addEventListener("click",()=>{
  document.body.requestPointerLock();
  document.getElementById("info").style.display="none";
});

document.addEventListener("mousemove",(e)=>{
  if(document.pointerLockElement !== document.body) return;

  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;

  pitch = Math.max(-1.5, Math.min(1.5, pitch));

  camera.rotation.set(pitch, yaw, 0);
});

// =====================
// GRAVITY + JUMP
// =====================
const speed = 0.12;
const gravity = 0.01;
const jumpPower = 0.2;

// =====================
// LOOP
// =====================
function animate(){
  requestAnimationFrame(animate);

  const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);

  // WASD
  if(keys["KeyW"]) camera.position.add(forward.clone().multiplyScalar(speed));
  if(keys["KeyS"]) camera.position.add(forward.clone().multiplyScalar(-speed));
  if(keys["KeyA"]) camera.position.add(right.clone().multiplyScalar(-speed));
  if(keys["KeyD"]) camera.position.add(right.clone().multiplyScalar(speed));

  // JUMP
  if(keys["Space"] && isGrounded){
    velocityY = jumpPower;
    isGrounded = false;
  }

  // GRAVITY
  velocityY -= gravity;
  camera.position.y += velocityY;

  // FLOOR COLLISION
  if(camera.position.y < 2){
    camera.position.y = 2;
    velocityY = 0;
    isGrounded = true;
  }

  renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
