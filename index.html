<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FPS SHOOTER FINAL</title>

<style>
body { margin:0; overflow:hidden; background:black; }
#info{
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  color:white;
  font-family:Arial;
  z-index:10;
}
#crosshair{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:18px;
  pointer-events:none;
  z-index:10;
}
</style>
</head>
<body>

<div id="info">INIT...</div>
<div id="crosshair">+</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/loaders/GLTFLoader.js"></script>

<script>

// =====================
// WEBGL CHECK (WICHTIG)
// =====================
function checkWebGL(){
  const canvas = document.createElement("canvas");
  const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");

  if(!gl){
    document.getElementById("info").innerText =
      "❌ WEBGL NOT AVAILABLE (Device/Browser Problem)";
    throw new Error("WebGL blocked");
  }
}
checkWebGL();

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// CAMERA
const camera = new THREE.PerspectiveCamera(
  75,
  innerWidth/innerHeight,
  0.1,
  1000
);
camera.position.set(0,1.6,5);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 1));
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5,10,5);
scene.add(light);

// FLOOR
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(100,100),
  new THREE.MeshStandardMaterial({color:0x2ecc71})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// DEBUG CUBE
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,1),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
cube.position.y = 1;
scene.add(cube);

// =====================
// GLB LOADER SAFE
// =====================
const loader = new THREE.GLTFLoader();

function loadGLB(path, name){

  document.getElementById("info").innerText = "Loading: " + name;

  loader.load(
    path,

    (gltf)=>{

      const obj = gltf.scene;

      // 🔥 REALISTIC FPS SIZE
      obj.scale.set(1,1,1);

      // 🔥 FPS HAND POSITION
      obj.position.set(0.4,-0.3,-0.7);

      obj.traverse(c=>{
        if(c.isMesh){
          c.material.side = THREE.DoubleSide;
        }
      });

      camera.add(obj);
      scene.add(camera);

      document.getElementById("info").innerText = "READY: " + name;
    },

    undefined,

    (err)=>{
      console.error(err);
      document.getElementById("info").innerText =
        "FAILED: " + name;
    }
  );
}

// =====================
// LOAD MODELS
// =====================
loadGLB("pistol.glb", "pistol");
loadGLB("pistol_schacht.glb", "slide");

// =====================
// FPS CONTROLS
// =====================
let yaw = 0;
let pitch = 0;

document.addEventListener("click",()=>{
  document.body.requestPointerLock();
});

document.addEventListener("mousemove",(e)=>{
  if(document.pointerLockElement !== document.body) return;

  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;

  pitch = Math.max(-1.5, Math.min(1.5, pitch));

  camera.rotation.set(pitch, yaw, 0);
});

// WASD
const keys = {};
document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

// =====================
// LOOP
// =====================
function animate(){
  requestAnimationFrame(animate);

  cube.rotation.y += 0.01;

  const speed = 0.08;

  const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);

  if(keys["KeyW"]) camera.position.add(forward.clone().multiplyScalar(speed));
  if(keys["KeyS"]) camera.position.add(forward.clone().multiplyScalar(-speed));
  if(keys["KeyA"]) camera.position.add(right.clone().multiplyScalar(-speed));
  if(keys["KeyD"]) camera.position.add(right.clone().multiplyScalar(speed));

  renderer.render(scene,camera);
}

animate();

document.getElementById("info").innerText = "RUNNING";

</script>

</body>
</html>
