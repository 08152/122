<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FPS Minecraft Shooter FIX</title>

<style>
body { margin:0; overflow:hidden; background:black; }
#info{
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  color:white;
  font-family:Arial;
}
#crosshair{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:20px;
  pointer-events:none;
}
</style>
</head>
<body>

<div id="info">CLICK TO START</div>
<div id="crosshair">+</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// CAMERA RIG (wichtig FIX)
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const cameraHolder = new THREE.Object3D();
cameraHolder.add(camera);
scene.add(cameraHolder);

camera.position.set(0, 1.6, 0);
cameraHolder.position.set(0, 2, 5);

// RENDERER
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 1));

// =====================
// GRUND
// =====================
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200,200),
  new THREE.MeshStandardMaterial({color:0x2ecc71})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// =====================
// GUN
// =====================
const gun = new THREE.Group();

const body = new THREE.Mesh(
  new THREE.BoxGeometry(0.2,0.2,0.6),
  new THREE.MeshStandardMaterial({color:0x333333})
);

const grip = new THREE.Mesh(
  new THREE.BoxGeometry(0.15,0.3,0.15),
  new THREE.MeshStandardMaterial({color:0x222222})
);
grip.position.y = -0.25;

gun.add(body);
gun.add(grip);

camera.add(gun);
gun.position.set(0.4,-0.3,-0.7);

// =====================
// CONTROLS
// =====================
const keys = {};
document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);

// =====================
// MOUSE LOOK FIX
// =====================
let yaw = 0;
let pitch = 0;

document.addEventListener("click",()=>{
  document.body.requestPointerLock();
  document.getElementById("info").style.display="none";
});

document.addEventListener("mousemove",(e)=>{
  if(document.pointerLockElement !== document.body) return;

  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;

  pitch = Math.max(-1.5, Math.min(1.5, pitch));

  cameraHolder.rotation.y = yaw;
  camera.rotation.x = pitch;
});

// =====================
// MOVEMENT
// =====================
const speed = 0.12;
let velocityY = 0;
let grounded = true;

function getForward(){
  return new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
}

function getRight(){
  return new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
}

// =====================
// LOOP
// =====================
function animate(){
  requestAnimationFrame(animate);

  const forward = getForward();
  const right = getRight();

  if(keys["KeyW"]) cameraHolder.position.add(forward.clone().multiplyScalar(speed));
  if(keys["KeyS"]) cameraHolder.position.add(forward.clone().multiplyScalar(-speed));
  if(keys["KeyA"]) cameraHolder.position.add(right.clone().multiplyScalar(-speed));
  if(keys["KeyD"]) cameraHolder.position.add(right.clone().multiplyScalar(speed));

  // jump
  if(keys["Space"] && grounded){
    velocityY = 0.2;
    grounded = false;
  }

  // gravity
  velocityY -= 0.01;
  cameraHolder.position.y += velocityY;

  // ground collision
  if(cameraHolder.position.y < 2){
    cameraHolder.position.y = 2;
    velocityY = 0;
    grounded = true;
  }

  renderer.render(scene,camera);
}

animate();

// =====================
// RESIZE FIX
// =====================
window.addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

</script>

</body>
</html>
